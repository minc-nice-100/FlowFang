name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # NOTE: flow-ebpf / flow-sampler / flow-processor have pre-existing aya
      # build breakage unrelated to the TUI; scope CI to the crates changed
      # here until that is fixed (see issue tracker).
      - name: Build
        run: cargo build -p flow-common -p flow-analyzer -p flow-analyzer-tui

      - name: Clippy
        run: cargo clippy -p flow-common -p flow-analyzer -p flow-analyzer-tui --all-targets

      - name: Test
        run: cargo test -p flow-common -p flow-analyzer -p flow-analyzer-tui
